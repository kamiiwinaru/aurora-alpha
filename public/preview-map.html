<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora – Star Map Preview</title>
<style>
  :root {
    --bg:      #080b10;
    --panel:   #0d1117;
    --border:  #1a2332;
    --cyan:    #00d4ff;
    --gold:    #c8a84b;
    --green:   #33cc66;
    --orange:  #ff6b00;
    --red:     #ff4444;
    --text:    #d6e2ee;
    --muted:   #8899aa;
    --dim:     #445566;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Courier New', monospace;
    color: var(--text);
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  .header-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .2em;
    color: var(--cyan);
  }
  .header-sep { color: var(--dim); }
  .header-stat { font-size: 9px; color: var(--muted); }
  .header-stat span { color: var(--text); }

  .controls {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: none;
    font-family: inherit;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .1em;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover, .btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,.08); }
  .btn-gold { border-color: rgba(200,168,75,.4); color: var(--gold); }
  .btn-gold:hover { background: rgba(200,168,75,.08); }

  /* ── Layout ── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Canvas ── */
  #mapCanvas {
    flex: 1;
    display: block;
    cursor: grab;
  }
  #mapCanvas:active { cursor: grabbing; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    border-left: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
  }
  .sidebar-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: .15em;
    color: var(--dim);
    margin-bottom: 6px;
  }
  .sidebar-value {
    font-size: 11px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .sidebar-sub {
    font-size: 9px;
    color: var(--muted);
  }
  .sec-hi  { color: var(--green); }
  .sec-low { color: var(--orange); }
  .sec-null{ color: var(--red); }

  .legend { padding: 10px 12px; }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 9px;
    color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: rgba(13,17,23,.95);
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-size: 10px;
    pointer-events: none;
    display: none;
    z-index: 100;
    min-width: 140px;
  }
  #tooltip .tt-name { font-size: 11px; color: var(--cyan); margin-bottom: 4px; }
  #tooltip .tt-row { color: var(--muted); margin-bottom: 2px; }
  #tooltip .tt-row span { color: var(--text); }

  /* ── Corner brackets ── */
  .bracket {
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: .5;
  }
  .bracket-tl { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
  .bracket-tr { top: 4px; right: 4px; border-width: 1px 1px 0 0; }
  .bracket-bl { bottom: 4px; left: 4px; border-width: 0 0 1px 1px; }
  .bracket-br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

  .canvas-wrap { position: relative; flex: 1; overflow: hidden; }

  /* ── Search ── */
  .search-wrap { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  input.search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 10px;
    padding: 5px 8px;
    outline: none;
  }
  input.search:focus { border-color: var(--cyan); }
  input.search::placeholder { color: var(--dim); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">Aurora // Star Map</div>
  <div class="header-sep">·</div>
  <div class="header-stat">Systems <span id="sysCount">—</span></div>

  <div class="controls">

    <button class="btn" onclick="resetView()">RESET</button>
  </div>
</div>

  </div>

      <div class="legend-row"><div class="dot" style="background:#c8a84b"></div>Selected system</div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">

const sysMap = new Map(SYSTEMS.map(s => [s.id, s]));

// ── State ──
// zoom: 1.0 = systems fill ~90% of canvas. coords are normalized [-1,1].
let canvas, ctx, W, H;
let zoom = 1.0, offsetX = 0, offsetY = 0;
let dragging = false, dragStart = {x:0,y:0}, dragOrigin = {x:0,y:0};
let selected = null;
let hoveredId = null;
let colorBySec = true;
const CURRENT_SYS = 30000142; // Jita

function secColor(sec) {
  if (sec >= 0.5) return '#33cc66';
  if (sec >= 0.1) return '#ff6b00';
  return '#ff4444';
}
function secLabel(sec) {
  if (sec >= 0.5) return `<span class="sec-hi">${sec.toFixed(1)}</span>`;
  if (sec >= 0.1) return `<span class="sec-low">${sec.toFixed(1)}</span>`;
  return `<span class="sec-null">${sec.toFixed(1)}</span>`;
}

// wx/wy are normalized coords [-1, 1]
function worldToCanvas(wx, wy) {
  const span = Math.min(W, H) * 0.45;
  const cx = W / 2 + offsetX + wx * span * zoom;
  const cy = H / 2 + offsetY + wy * span * zoom;
  return [cx, cy];
}
function canvasToWorld(cx, cy) {
  const span = Math.min(W, H) * 0.45;
  return [(cx - W/2 - offsetX) / (span * zoom), (cy - H/2 - offsetY) / (span * zoom)];
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background star field
  ctx.fillStyle = '#080b10';
  ctx.fillRect(0, 0, W, H);

  // Subtle star field
  const starSeed = 42;
  for (let i = 0; i < 200; i++) {
    const px = ((i * 1618 + starSeed * 31) % 1000) / 1000 * W;
    const py = ((i * 2741 + starSeed * 17) % 1000) / 1000 * H;
    const alpha = 0.1 + ((i * 97) % 100) / 400;
    ctx.fillStyle = `rgba(180,200,220,${alpha})`;
    ctx.fillRect(px, py, 1, 1);
  }

  // Draw jump connections (always visible)
  ctx.lineWidth = 0.5;
  const drawn = new Set();
  for (const s of SYSTEMS) {
    const [ax, ay] = worldToCanvas(s.x, s.z);
    for (const tid of s.conns) {
      const key = [Math.min(s.id, tid), Math.max(s.id, tid)].join('-');
      if (drawn.has(key)) continue;
      drawn.add(key);
      const t = sysMap.get(tid);
      if (!t) continue;
      const [bx, by] = worldToCanvas(t.x, t.z);
      ctx.strokeStyle = 'rgba(30,60,90,0.9)';
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.stroke();
    }
  }

  // Draw systems
  for (const s of SYSTEMS) {
    const [cx, cy] = worldToCanvas(s.x, s.z);
    if (cx < -20 || cx > W + 20 || cy < -20 || cy > H + 20) continue;

    const isSelected = selected && selected.id === s.id;
    const isCurrent  = s.id === CURRENT_SYS;
    const isHovered  = hoveredId === s.id;

    let baseColor = colorBySec ? secColor(s.sec) : '#445566';
    if (isCurrent)  baseColor = '#00d4ff';
    if (isSelected) baseColor = '#c8a84b';

    const r = isSelected ? 5 : isCurrent ? 5 : isHovered ? 4 : 2.5;

    // Glow
    if (isSelected || isCurrent || isHovered) {
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 4);
      grd.addColorStop(0, baseColor + '44');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Labels at zoom >= 1.5 or for special systems
    if (zoom >= 1.5 || isSelected || isCurrent) {
      ctx.fillStyle = isSelected ? '#c8a84b' : isCurrent ? '#00d4ff' : 'rgba(180,200,220,0.7)';
      ctx.font = `${isSelected || isCurrent ? 10 : 9}px 'Courier New'`;
      ctx.textAlign = 'left';
      ctx.fillText(s.name, cx + r + 4, cy + 4);
    }
  }

  // Zoom indicator
  ctx.fillStyle = 'rgba(26,35,50,.7)';
  ctx.fillRect(16, H - 28, 110, 14);
  ctx.fillStyle = '#445566';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`ZOOM ${zoom.toFixed(2)}x  ·  ${SYSTEMS.length} sys`, 20, H - 18);
}

function findHovered(mx, my) {
  let best = null, bestD = 12;
  for (const s of SYSTEMS) {
    const [cx, cy] = worldToCanvas(s.x, s.z);
    const d = Math.hypot(mx - cx, my - cy);
    if (d < bestD) { bestD = d; best = s; }
  }
  return best;
}

// ── Events ──
function initCanvas() {
  canvas = document.getElementById('mapCanvas');
  ctx = canvas.getContext('2d');
  resize();

  canvas.addEventListener('mousedown', e => {
    dragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragOrigin = { x: offsetX, y: offsetY };
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    if (dragging) {
      offsetX = dragOrigin.x + (e.clientX - dragStart.x);
      offsetY = dragOrigin.y + (e.clientY - dragStart.y);
      draw();
    }
    const h = findHovered(mx, my);
    hoveredId = h ? h.id : null;
    showTooltip(h, e.clientX, e.clientY);
    draw();
  });
  canvas.addEventListener('mouseup', e => {
    const moved = Math.hypot(e.clientX - dragStart.x, e.clientY - dragStart.y);
    dragging = false;
    if (moved < 5) {
      const rect = canvas.getBoundingClientRect();
      const h = findHovered(e.clientX - rect.left, e.clientY - rect.top);
      selectSystem(h);
    }
  });
  canvas.addEventListener('mouseleave', () => {
    dragging = false;
    hoveredId = null;
    document.getElementById('tooltip').style.display = 'none';
    draw();
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    // zoom toward mouse pointer
    const wx = mx - W/2 - offsetX;
    const wy = my - H/2 - offsetY;
    zoom = Math.max(0.3, Math.min(10, zoom * factor));
    offsetX = mx - W/2 - wx * factor;
    offsetY = my - H/2 - wy * factor;
    draw();
  }, { passive: false });

  window.addEventListener('resize', () => { resize(); draw(); });
}

function resize() {
  const wrap = canvas.parentElement;
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}

function showTooltip(sys, mx, my) {
  const tt = document.getElementById('tooltip');
  if (!sys) { tt.style.display = 'none'; return; }
  document.getElementById('ttName').textContent   = sys.name;
  document.getElementById('ttRegion').textContent  = sys.region;
  document.getElementById('ttSec').innerHTML = secLabel(sys.sec);
  document.getElementById('ttConns').textContent   = sys.conns.length;
  tt.style.display = 'block';
  tt.style.left = (mx + 14) + 'px';
  tt.style.top  = (my - 10) + 'px';
}

function selectSystem(sys) {
  selected = sys || null;
  document.getElementById('selName').textContent   = sys ? sys.name  : '—';
  document.getElementById('selRegion').textContent  = sys ? sys.region: '—';
  document.getElementById('selSec').innerHTML = sys ? `Security: ${secLabel(sys.sec)}` : '—';
  document.getElementById('selJumps').textContent   = sys ? `${sys.conns.length} connection(s)` : '—';
  draw();
}

function setView(v) {
  document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function toggleSecColor() {
  colorBySec = !colorBySec;
  const btn = document.querySelector('.btn-gold');
  btn.style.opacity = colorBySec ? '1' : '0.5';
  draw();
}

function resetView() {
  zoom = 1.0; offsetX = 0; offsetY = 0;
  draw();
}

// Search
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sysCount').textContent  = SYSTEMS.length;
  document.getElementById('jumpCount').textContent = SYSTEMS.reduce((a,s) => a + s.conns.length, 0);

  initCanvas();
  zoom = 1.0;
  draw();

  document.getElementById('searchInput').addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { selected = null; draw(); return; }
    const match = SYSTEMS.find(s => s.name.toLowerCase().includes(q));
    if (match) {
      selected = match;
      const span = Math.min(W, H) * 0.45;
      offsetX = -(match.x * span * zoom);
      offsetY = -(match.z * span * zoom);
      selectSystem(match);
    }
  });
});
</script>
</body>
</html>
