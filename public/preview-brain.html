<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Brain Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #070b10;
    color: #a8c8e8;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-container.dragging { cursor: grabbing; }

  svg#graph {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  /* ── Header ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 10px 20px;
    background: rgba(7,11,16,0.85);
    border-bottom: 1px solid #1a3a5c;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  #header h1 {
    color: #00b8d9;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 12px #00b8d980;
  }
  .filter-btn {
    background: rgba(0,184,217,0.08);
    border: 1px solid #1a3a5c;
    color: #7fa8cc;
    padding: 4px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(0,184,217,0.18);
    border-color: #00b8d9;
    color: #00b8d9;
  }
  #node-count {
    margin-left: auto;
    font-size: 10px;
    color: #3a5a7c;
    letter-spacing: 1px;
  }
  #search-input {
    background: rgba(0,184,217,0.06);
    border: 1px solid #1a3a5c;
    color: #a8c8e8;
    padding: 4px 10px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    width: 160px;
    outline: none;
  }
  #search-input:focus { border-color: #00b8d9; }
  #search-input::placeholder { color: #3a5a7c; }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(7,11,16,0.88);
    border: 1px solid #1a3a5c;
    padding: 12px 16px;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  #legend h3 { font-size: 9px; letter-spacing: 2px; color: #3a5a7c; margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 10px; color: #7fa8cc; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Info Panel ── */
  #info-panel {
    position: fixed;
    top: 55px;
    right: 20px;
    width: 260px;
    background: rgba(7,11,16,0.92);
    border: 1px solid #1a3a5c;
    padding: 16px;
    z-index: 100;
    backdrop-filter: blur(6px);
    display: none;
  }
  #info-panel.visible { display: block; }
  #info-title {
    font-size: 13px;
    color: #00b8d9;
    margin-bottom: 4px;
    text-shadow: 0 0 8px #00b8d960;
  }
  #info-type {
    font-size: 9px;
    letter-spacing: 2px;
    color: #3a5a7c;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  #info-desc {
    font-size: 11px;
    color: #7fa8cc;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  #info-connections {
    font-size: 10px;
    color: #4a6a8c;
    border-top: 1px solid #1a3a5c;
    padding-top: 8px;
  }
  #info-connections span { display: block; margin-bottom: 3px; }
  #info-connections .conn-to { color: #00b8d980; }
  #info-file {
    font-size: 9px;
    color: #2a4a6c;
    margin-top: 8px;
    font-style: italic;
  }

  /* ── Controls hint ── */
  #controls-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 9px;
    color: #2a4a6c;
    text-align: right;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* ── Graph elements ── */
  .edge {
    stroke-width: 1;
    fill: none;
    opacity: 0.35;
    transition: opacity 0.2s;
    marker-end: url(#arrow);
  }
  .edge.highlighted { opacity: 0.9; stroke-width: 1.5; }
  .edge.dimmed { opacity: 0.05; }

  .node-group { cursor: pointer; }
  .node-group:hover .node-circle { filter: brightness(1.4); }

  .node-circle {
    transition: r 0.2s, filter 0.2s;
  }
  .node-circle.highlighted { filter: brightness(1.6); }
  .node-circle.dimmed { opacity: 0.2; }

  .node-label {
    fill: #a8c8e8;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    pointer-events: none;
    transition: opacity 0.2s;
    text-anchor: middle;
  }
  .node-label.dimmed { opacity: 0.15; }
  .node-label.highlighted { fill: #fff; font-size: 11px; }

  .node-sublabel {
    fill: #3a5a7c;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    pointer-events: none;
    text-anchor: middle;
    transition: opacity 0.2s;
  }
  .node-sublabel.dimmed { opacity: 0.1; }

  /* ── Scanline overlay ── */
  #scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 200;
  }
</style>
</head>
<body>
<div id="scanlines"></div>

<div id="header">
  <h1>Aurora :: Brain Map</h1>
  <button class="filter-btn active" data-filter="all">ALL</button>
  <button class="filter-btn" data-filter="frontend">FRONTEND</button>
  <button class="filter-btn" data-filter="backend">BACKEND</button>
  <button class="filter-btn" data-filter="hooks">HOOKS</button>
  <button class="filter-btn" data-filter="panels">PANELS</button>
  <button class="filter-btn" data-filter="tools">AI TOOLS</button>
  <button class="filter-btn" data-filter="external">EXTERNAL</button>
  <input id="search-input" type="text" placeholder="Search nodes..." />
  <span id="node-count"></span>
</div>

<div id="canvas-container">
  <svg id="graph">
    <defs>
      <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#1a3a5c" />
      </marker>
      <marker id="arrow-hi" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#00b8d9" />
      </marker>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="edges-layer"></g>
    <g id="nodes-layer"></g>
  </svg>
</div>

<div id="legend">
  <h3>NODE TYPES</h3>
  <div class="legend-row"><div class="legend-dot" style="background:#00b8d9"></div>Core / Orchestrator</div>
  <div class="legend-row"><div class="legend-dot" style="background:#7b68ee"></div>Hooks (React state)</div>
  <div class="legend-row"><div class="legend-dot" style="background:#20a060"></div>UI Components</div>
  <div class="legend-row"><div class="legend-dot" style="background:#e8922a"></div>Panels</div>
  <div class="legend-row"><div class="legend-dot" style="background:#c84848"></div>Backend / Server</div>
  <div class="legend-row"><div class="legend-dot" style="background:#d4aa20"></div>AI Tools (Claude)</div>
  <div class="legend-row"><div class="legend-dot" style="background:#888"></div>External APIs</div>
  <div class="legend-row"><div class="legend-dot" style="background:#2a6a5c"></div>Persistence</div>
</div>

<div id="info-panel">
  <div id="info-title"></div>
  <div id="info-type"></div>
  <div id="info-desc"></div>
  <div id="info-connections"></div>
  <div id="info-file"></div>
</div>

<div id="controls-hint">
  SCROLL · zoom<br>
  DRAG · pan<br>
  CLICK · inspect<br>
  HOVER · highlight
</div>

// ═══════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════
const TYPE_COLOR = {
  core:      '#00b8d9',
  hook:      '#7b68ee',
  component: '#20a060',
  panel:     '#e8922a',
  backend:   '#c84848',
  tool:      '#d4aa20',
  external:  '#888888',
  persist:   '#2a7a6c',
  lib:       '#20a060',
};

// ═══════════════════════════════════════════════════════════
// LAYOUT — force-directed with manual seed positions
// ═══════════════════════════════════════════════════════════
const cx = 900, cy = 520;
const POSITIONS = {
  // Core center
  App:        [cx, cy],
  // Hooks ring
  useChat:    [cx - 220, cy - 40],
  useEve:     [cx + 180, cy - 60],
  useVoiceInput: [cx - 180, cy + 140],
  // Backend cluster (bottom-left)
  Server:     [cx - 350, cy + 220],
  AgenticLoop:[cx - 350, cy + 340],
  // AI Tools cluster
  tool_query_assets:   [cx - 560, cy + 260],
  tool_query_industry: [cx - 560, cy + 340],
  tool_query_skills:   [cx - 560, cy + 420],
  tool_appraise:       [cx - 430, cy + 440],
  tool_price_history:  [cx - 320, cy + 460],
  tool_calc_blueprint: [cx - 200, cy + 440],
  tool_todo:           [cx - 100, cy + 460],
  tool_roadmap:        [cx - 60, cy + 390],
  tool_mail:           [cx - 130, cy + 340],
  tool_contracts:      [cx - 260, cy + 380],
  // Persistence (bottom)

  DiskFiles:   [cx + 60, cy + 480],
  LocalStorage:[cx + 200, cy + 360],
  // External APIs (right cluster)

  ESI:         [cx + 520, cy + 240],
  EveSso:      [cx + 480, cy - 40],
  ElevenLabs:  [cx + 460, cy + 350],
  Janice:      [cx + 360, cy + 420],
  Fuzzwork:    [cx + 260, cy + 500],

  ChatWindow:  [cx - 80, cy - 180],
  ChatInput:   [cx - 240, cy - 200],
  Sidebar:     [cx - 380, cy - 80],
  NavTabs:     [cx + 20, cy - 220],
  LandingPage: [cx + 100, cy - 160],
  EveLogin:    [cx + 300, cy - 120],
  VoiceBubble: [cx - 80, cy + 160],
  UsageBar:    [cx + 320, cy + 60],
  VentureGame: [cx + 260, cy - 200],
  // Panels (top-right arc)
  SkillPanel:   [cx - 440, cy - 200],
  IndustryPanel:[cx - 520, cy - 80],
  AssetsPanel:  [cx - 560, cy + 60],

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
let transform = { x: 0, y: 0, k: 0.72 };
let activeFilter = 'all';
let selectedNode = null;

const svg = document.getElementById('graph');
const edgesLayer = document.getElementById('edges-layer');
const nodesLayer = document.getElementById('nodes-layer');

function applyTransform() {
  edgesLayer.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
  nodesLayer.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
}

function nodePos(id) {
  return POSITIONS[id] || [cx, cy];
}

function isVisible(node) {
  if (activeFilter === 'all') return true;
  return node.group === activeFilter;
}

function drawEdges() {
  edgesLayer.innerHTML = '';
  EDGES.forEach(e => {
    const [x1, y1] = nodePos(e.from);
    const [x2, y2] = nodePos(e.to);
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) return;

    const r2 = (NODES.find(n=>n.id===e.to)||{r:12}).r + 2;
    const ex = x2 - dx/len * r2;
    const ey = y2 - dy/len * r2;

    // Quadratic bezier for curves
    const mx = (x1+x2)/2 + dy*0.08;
    const my = (y1+y2)/2 - dx*0.08;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} Q${mx},${my} ${ex},${ey}`);

    const fromNode = NODES.find(n=>n.id===e.from);
    const toNode = NODES.find(n=>n.id===e.to);
    const color = TYPE_COLOR[fromNode?.type] || '#1a3a5c';

    path.setAttribute('stroke', color);
    path.setAttribute('class', 'edge');
    path.setAttribute('data-from', e.from);
    path.setAttribute('data-to', e.to);
    edgesLayer.appendChild(path);
  });
}

function drawNodes() {
  nodesLayer.innerHTML = '';
  NODES.forEach(node => {
    const [x, y] = nodePos(node.id);
    const color = TYPE_COLOR[node.type] || '#888';
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-group');
    g.setAttribute('data-id', node.id);
    g.setAttribute('data-group', node.group);

    // Outer ring
    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('cx', x); ring.setAttribute('cy', y);
    ring.setAttribute('r', node.r + 3);
    ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', color);
    ring.setAttribute('stroke-width', '0.5');
    ring.setAttribute('opacity', '0.3');
    g.appendChild(ring);

    // Main circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x); circle.setAttribute('cy', y);
    circle.setAttribute('r', node.r);
    circle.setAttribute('fill', color + '22');
    circle.setAttribute('stroke', color);
    circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('class', 'node-circle');
    g.appendChild(circle);

    // Label
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x); label.setAttribute('y', y + node.r + 14);
    label.setAttribute('class', 'node-label');
    label.textContent = node.label;
    g.appendChild(label);

    // Sub-label
    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', x); sub.setAttribute('y', y + node.r + 24);
    sub.setAttribute('class', 'node-sublabel');
    sub.textContent = node.sub;
    g.appendChild(sub);

    g.addEventListener('mouseenter', () => highlightNode(node.id));
    g.addEventListener('mouseleave', () => clearHighlight());
    g.addEventListener('click', () => selectNode(node));

    nodesLayer.appendChild(g);
  });
}

function highlightNode(id) {
  const connectedIds = new Set([id]);
  EDGES.forEach(e => {
    if (e.from === id) connectedIds.add(e.to);
    if (e.to === id) connectedIds.add(e.from);
  });

  document.querySelectorAll('.node-group').forEach(g => {
    const nid = g.getAttribute('data-id');
    const circle = g.querySelector('.node-circle');
    const label = g.querySelector('.node-label');
    const sub = g.querySelector('.node-sublabel');
    if (connectedIds.has(nid)) {
      circle?.classList.remove('dimmed'); circle?.classList.add('highlighted');
      label?.classList.remove('dimmed'); label?.classList.add('highlighted');
      sub?.classList.remove('dimmed');
    } else {
      circle?.classList.add('dimmed'); circle?.classList.remove('highlighted');
      label?.classList.add('dimmed'); label?.classList.remove('highlighted');
      sub?.classList.add('dimmed');
    }
  });

  document.querySelectorAll('.edge').forEach(e => {
    const f = e.getAttribute('data-from'), t = e.getAttribute('data-to');
    if (f === id || t === id) {
      e.classList.add('highlighted'); e.classList.remove('dimmed');
    } else {
      e.classList.add('dimmed'); e.classList.remove('highlighted');
    }
  });
}

function clearHighlight() {
  document.querySelectorAll('.node-circle').forEach(c => { c.classList.remove('dimmed','highlighted'); });
  document.querySelectorAll('.node-label').forEach(c => { c.classList.remove('dimmed','highlighted'); });
  document.querySelectorAll('.node-sublabel').forEach(c => { c.classList.remove('dimmed'); });
  document.querySelectorAll('.edge').forEach(c => { c.classList.remove('dimmed','highlighted'); });
}

function selectNode(node) {
  selectedNode = node;
  const panel = document.getElementById('info-panel');
  const connectedTo = EDGES.filter(e => e.from === node.id).map(e => `→ ${e.to} <span class="conn-to">(${e.label})</span>`);
  const connectedFrom = EDGES.filter(e => e.to === node.id).map(e => `← ${e.from} <span class="conn-to">(${e.label})</span>`);

  document.getElementById('info-title').textContent = node.label;
  document.getElementById('info-type').textContent = node.type.toUpperCase() + ' · ' + node.group.toUpperCase();
  document.getElementById('info-desc').textContent = node.desc;
  document.getElementById('info-file').textContent = node.file;
  document.getElementById('info-connections').innerHTML =
    (connectedTo.length ? '<span style="color:#3a5a7c;font-size:9px;letter-spacing:1px">CONNECTS TO</span>' + connectedTo.join('') : '') +
    (connectedFrom.length ? '<span style="color:#3a5a7c;font-size:9px;letter-spacing:1px;margin-top:4px;display:block">RECEIVES FROM</span>' + connectedFrom.join('') : '');
  panel.classList.add('visible');
}

function applyFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.node-group').forEach(g => {
    const group = g.getAttribute('data-group');
    const show = filter === 'all' || group === filter;
    g.style.opacity = show ? '1' : '0.08';
    g.style.pointerEvents = show ? 'all' : 'none';
  });
  document.querySelectorAll('.edge').forEach(e => {
    if (filter === 'all') { e.style.opacity = ''; return; }
    const fromNode = NODES.find(n => n.id === e.getAttribute('data-from'));
    const toNode = NODES.find(n => n.id === e.getAttribute('data-to'));
    const show = fromNode?.group === filter || toNode?.group === filter;
    e.style.opacity = show ? '' : '0.03';
  });

  const count = filter === 'all' ? NODES.length : NODES.filter(n => n.group === filter).length;
  document.getElementById('node-count').textContent = count + ' NODES';
}

// ── Pan & Zoom
let isPanning = false, startX, startY, startTX, startTY;
const container = document.getElementById('canvas-container');

container.addEventListener('mousedown', e => {
  if (e.target.closest('.node-group')) return;
  isPanning = true;
  startX = e.clientX; startY = e.clientY;
  startTX = transform.x; startTY = transform.y;
  container.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  transform.x = startTX + (e.clientX - startX);
  transform.y = startTY + (e.clientY - startY);
  applyTransform();
});
document.addEventListener('mouseup', () => { isPanning = false; container.classList.remove('dragging'); });

container.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newK = Math.max(0.2, Math.min(3, transform.k * delta));
  transform.x = mx - (mx - transform.x) * (newK / transform.k);
  transform.y = my - (my - transform.y) * (newK / transform.k);
  transform.k = newK;
  applyTransform();
}, { passive: false });

// Center on initial load
transform.x = window.innerWidth/2 - cx * transform.k;
transform.y = window.innerHeight/2 - cy * transform.k + 20;

// ── Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.getAttribute('data-filter'));
  });
});

// ── Search
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  if (!q) { clearHighlight(); return; }
  const matched = NODES.filter(n =>
    n.id.toLowerCase().includes(q) ||
    n.label.toLowerCase().includes(q) ||
    n.desc.toLowerCase().includes(q)
  ).map(n => n.id);
  if (matched.length === 1) highlightNode(matched[0]);
  else {
    document.querySelectorAll('.node-group').forEach(g => {
      const show = matched.includes(g.getAttribute('data-id'));
      g.querySelector('.node-circle')?.classList.toggle('dimmed', !show);
      g.querySelector('.node-label')?.classList.toggle('dimmed', !show);
    });
  }
});

// ── Dismiss info panel on bg click
container.addEventListener('click', e => {
  if (!e.target.closest('.node-group')) {
    document.getElementById('info-panel').classList.remove('visible');
    selectedNode = null;
  }
});

// ── Init
drawEdges();
drawNodes();
applyTransform();
applyFilter('all');
document.getElementById('node-count').textContent = NODES.length + ' NODES';
</script>
